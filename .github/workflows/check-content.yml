name: Check Content

on:
  schedule:
    - cron: "0 0 1,15 * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  issues: write

jobs:
  link-checker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Lychee Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: "--verbose --no-progress --config .github/scripts/lychee.toml './index.html' './README.md' './CHANGELOG.md' './SOURCES.md'"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for existing open issue
        if: steps.lychee.outputs.exit_code != 0
        id: existing
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'broken-links',
              state: 'open'
            });
            core.setOutput('found', issues.data.length > 0 ? 'true' : 'false');

      - name: Create issue if links are broken
        if: steps.lychee.outputs.exit_code != 0 && steps.existing.outputs.found == 'false'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "🚨 Broken links detected in the planner"
          content-filepath: ./lychee/out.md
          labels: bug, broken-links

  source-watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check GOV.UK sources against their Last verified date
        id: check
        run: python3 .github/scripts/check_source_updates.py | tee -a "$GITHUB_OUTPUT"

      - name: Check for existing open issue
        if: steps.check.outputs.changes_detected == 'true'
        id: existing
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'source-changed',
              state: 'open'
            });
            core.setOutput('found', issues.data.length > 0 ? 'true' : 'false');

      - name: Create issue if a source may have changed
        if: steps.check.outputs.changes_detected == 'true' && steps.existing.outputs.found == 'false'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "📄 Possible source changes in SOURCES.md"
          content-filepath: ./source-watch-report.md
          labels: source-changed
